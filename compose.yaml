# =============================================================================
# Docker Compose File Conventions
# =============================================================================
#
# This file defines the shared local infrastructure for the repository.
# Today that means:
#   - one Traefik edge proxy
#   - one PostgreSQL server
#   - one pgAdmin instance
#   - one Mailpit SMTP/web UI service
#
# As this template grows into a multi-application repository, additional
# logical databases should be added to the inline init SQL below rather than
# by starting more Postgres containers.
#
# WHY THIS FILE EXISTS:
#   - `compose up` gives every developer the same local infrastructure
#   - One Postgres server can host multiple application databases locally
#   - The backend app demonstrates the naming convention:
#       app name = database name = application username
#
# LOCAL DATABASE CONVENTION:
#   - Shared server admin user: postgres
#   - One logical database per application
#   - One application user per application database
#   - Current backend app example:
#       app name: backend
#       database: backend
#       app user: backend
#
# SERVICE FIELD ORDER (keep this sequence for each service):
#   1. labels
#   2. image
#   3. depends_on
#   4. command/entrypoint
#   5. environment
#   6. configs
#   7. volumes
#   8. ports
#   9. restart
#
# ENVIRONMENT VARIABLES:
#   - All overridable values use ${VAR:-default} syntax
#   - Override via .env, .env.local, or shell environment
#   - Current variables:
#       POSTGRES_IMAGE
#       PG_PORT
#       PGADMIN_IMAGE
#       PGADMIN_PORT
#       EDGE_PORT
#       MAILPIT_IMAGE
#       MAILPIT_WEB_PORT
#       MAILPIT_SMTP_PORT
#
# QUICK REFERENCE:
#   Start services:   compose up
#   Stop services:    compose down
#   Clean volumes:    compose clean
#   Show status:      compose ps
#   View logs:        compose logs
#
# IMPORTANT:
#   - The inline init SQL only runs when the postgres volume is empty
#   - After changing database creation SQL, run `compose clean` before `compose up`
#   - Do not set container_name; let Compose manage names
#
# =============================================================================

volumes:
  postgres:
  pgadmin:

configs:
  # Inline SQL keeps the template self-contained while still documenting the
  # expected multi-application pattern in one place.
  postgres_init:
    content: |
      CREATE USER backend WITH PASSWORD 'password';

      CREATE DATABASE backend
          WITH
          OWNER = backend
          ENCODING = 'UTF8'
          LC_COLLATE = 'en_US.utf8'
          LC_CTYPE = 'en_US.utf8'
          TABLESPACE = pg_default
          CONNECTION LIMIT = -1;

      -- Add more application-specific users and databases here as this
      -- repository grows into multiple applications sharing one Postgres
      -- server for local development.
  pgadmin_servers:
    content: |
      {
        "Servers": {
          "1": {
            "Name": "Shared Local Postgres",
            "Group": "Servers",
            "Port": 5432,
            "Username": "postgres",
            "Host": "postgres",
            "SSLMode": "prefer",
            "MaintenanceDB": "postgres",
            "PassFile": "/tmp/pgpassfile"
          }
        }
      }

services:
  # ==========================================================================
  # Edge Proxy
  # ==========================================================================
  traefik:
    image: "${TRAEFIK_IMAGE:-traefik:v3.7}"
    command:
      - "--entrypoints.web.address=:8080"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--providers.file.watch=true"
    volumes:
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
    ports:
      - "${EDGE_PORT:-7070}:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ==========================================================================
  # Local Messaging Services
  # ==========================================================================
  mailpit:
    image: "${MAILPIT_IMAGE:-axllent/mailpit:v1.29}"
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    restart: unless-stopped

  # ==========================================================================
  # Database Services
  # ==========================================================================
  postgres:
    image: "${POSTGRES_IMAGE:-postgres:18}"

    # Docker defaults /dev/shm to 64MB. PostgreSQL can hit that limit under
    # normal local usage, so we raise it to a safer development default.
    shm_size: 256mb
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "password"
      PGDATA: "/data/postgres"
    configs:
      - source: postgres_init
        target: /docker-entrypoint-initdb.d/01-init.sql
    volumes:
      - postgres:/data/postgres
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      # Use a non-default host port to reduce conflicts with workstation Postgres.
      - "${PG_PORT:-15432}:5432"
    restart: unless-stopped

  pgadmin:
    image: "${PGADMIN_IMAGE:-dpage/pgadmin4:9.14}"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@example.com"
      PGADMIN_DEFAULT_PASSWORD: "admin"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_REPLACE_SERVERS_ON_STARTUP: "True"
      PGADMIN_CONFIG_CONSOLE_LOG_LEVEL: 30
      GUNICORN_ACCESS_LOGFILE: "/var/lib/pgadmin/access.log"
    configs:
      - source: pgadmin_servers
        target: /pgadmin4/servers.json
    volumes:
      - pgadmin:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-15433}:80"
    entrypoint:
      - "/bin/sh"
      - "-c"
      # Pre-load the Postgres admin password so pgAdmin connects without prompts.
      - "/bin/echo 'postgres:5432:*:postgres:password' > /tmp/pgpassfile && chmod 600 /tmp/pgpassfile && /entrypoint.sh"
    restart: unless-stopped
