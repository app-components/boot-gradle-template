http:
  routers:
    backend:
      entryPoints:
        - web
      rule: "PathPrefix(`/api`)"
      priority: 100
      service: backend

    frontend:
      entryPoints:
        - web
      rule: "PathPrefix(`/`)"
      priority: 1
      service: frontend

  services:
    backend:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:8080"

    frontend:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5173"
