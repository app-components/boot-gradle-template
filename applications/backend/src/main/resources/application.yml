server:
  port: 8080

spring:
  application:
    name: backend

  docker:
    compose:
      enabled: false

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:15432}/${DB_NAME:backend}
    username: backend
    password: password

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

app:
  mail:
    from: ${APP_MAIL_FROM:quotes@example.local}
