#
# SPA hosting notes
# -----------------
# This file serves a Vue single-page application (SPA) that uses browser-history
# routing. That means the browser may request paths like "/quotes/42" directly,
# even though there is no real file on disk at that path.
#
# The key hosting rules are:
# 1. Serve real static files normally.
#    Example: /assets/index-abc123.js or /favicon.svg
#
# 2. For unknown application routes, fall back to /index.html.
#    That lets Vue Router read the current URL and render the correct screen.
#
# 3. Cache index.html conservatively.
#    index.html is the HTML shell for the app and points at the current JS/CSS
#    bundle filenames. If a browser keeps an old copy of index.html, it may keep
#    pointing at stale or missing assets after a new deployment.
#
# 4. Cache built assets aggressively.
#    Vite emits fingerprinted files under /assets/, such as
#    "index-BPRn9F_k.js". When the file content changes, the filename changes.
#    That makes these files safe to cache for a long time.
#
# 5. Missing assets should return 404, not index.html.
#    If a JS or CSS file is missing, the error should be obvious. Returning
#    index.html for a missing asset path hides the real problem.
#
# In short:
# - index.html stays fresh
# - /assets/* caches hard
# - frontend routes fall back to index.html
# - missing assets fail with 404
#
server {
    # Unprivileged NGINX images default to a non-root port.
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reduce server fingerprinting in responses.
    server_tokens off;

    # Basic browser hardening headers for a static SPA.
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Compress text assets to reduce transfer size.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # The HTML shell should always be revalidated so clients pick up new builds.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires -1;
    }

    # Fingerprinted frontend assets are safe to cache aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # Root-level static files are cacheable, but not as aggressively as
    # fingerprinted assets because their filenames do not change on each build.
    location ~* ^/(favicon\.svg|favicon\.ico|icons\.svg|robots\.txt)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # Do not expose hidden files such as dotfiles.
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Vue Router history mode needs unknown routes to fall back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
