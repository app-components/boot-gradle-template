name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        # cache-provider: basic forces the MIT-licensed cache implementation
        # (backed by actions/cache). v6 ships an enhanced "gradle-actions-caching"
        # library by default that is proprietary and may become paid for
        # commercial use; "basic" keeps this workflow 100% OSS.
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      # `./gradlew build` runs `check` (test + spotlessCheck + restrictImports
      # + every other check-task contributor) plus `assemble` (compile + jar
      # everything). The Testcontainers integration tests run as part of `test`
      # and use Docker, which is pre-installed on the ubuntu-latest runner.
      - name: Run full Gradle build
        run: ./gradlew build

      # Node version comes from applications/frontend/package.json's engines.node
      # field. The same field is enforced locally by npm via .npmrc's
      # engine-strict=true, so CI and local development read from the same value.
      # The repo also pins node in mise.toml for the local-tooling activation
      # path; both should match.
      # cache: npm keys node_modules off the lockfile so warm runs skip the
      # install. cache-dependency-path is required because the lockfile lives
      # in the frontend subdir, not the repo root.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: applications/frontend/package.json
          cache: npm
          cache-dependency-path: applications/frontend/package-lock.json

      # `npm ci` installs from the lockfile exactly (fails on drift). `npm run
      # build` runs `vue-tsc -b && vite build` per the frontend's package.json,
      # which type-checks the Vue/TS code and produces the production bundle.
      - name: Build frontend
        working-directory: applications/frontend
        run: |
          npm ci
          npm run build
