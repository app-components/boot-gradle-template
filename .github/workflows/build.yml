name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        # cache-provider: basic forces the MIT-licensed cache implementation
        # (backed by actions/cache). v6 ships an enhanced "gradle-actions-caching"
        # library by default that is proprietary and may become paid for
        # commercial use; "basic" keeps this workflow 100% OSS.
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      # `./gradlew build` runs `check` (test + spotlessCheck + restrictImports
      # + every other check-task contributor) plus `assemble` (compile + jar
      # everything). The Testcontainers integration tests run as part of `test`
      # and use Docker, which is pre-installed on the ubuntu-latest runner.
      - name: Run full Gradle build
        run: ./gradlew build
