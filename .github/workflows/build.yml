name: Build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      # `./gradlew build` runs `check` (test + spotlessCheck + restrictImports
      # + every other check-task contributor) plus `assemble` (compile + jar
      # everything). The Testcontainers integration tests run as part of `test`
      # and use Docker, which is pre-installed on the ubuntu-latest runner.
      - name: Run full Gradle build
        run: ./gradlew build
