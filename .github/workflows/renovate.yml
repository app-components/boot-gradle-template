# =============================================================================
# Renovate (self-hosted, runs on GitHub Actions)
# =============================================================================
#
# Why self-hosted instead of the Mend-hosted Renovate GitHub App:
# This is a template that gets forked into private projects. Mend-hosted Renovate
# would clone every private fork to Mend's SaaS infrastructure to scan it. Running
# Renovate ourselves on GitHub-hosted Actions runners keeps the code inside
# GitHub's boundary — clones happen on ephemeral GitHub runners and never leave.
#
# -----------------------------------------------------------------------------
# One-time setup per fork
# -----------------------------------------------------------------------------
# This workflow authenticates as a GitHub App. Until the App is installed and the
# two secrets below exist, the workflow runs on schedule but cannot open PRs.
#
# Why a GitHub App (not a PAT):
#   - PATs are owned by an individual account. If this repo lives in an org and
#     the PAT owner leaves or rotates the token, Renovate silently breaks.
#   - A GitHub App is owned by the org, has scoped per-install permissions, and
#     mints short-lived installation tokens at runtime — no long-lived secret
#     with broad access is stored in the repo.
#
# To set this up:
#   1. Create a GitHub App (org-owned) at
#        Org Settings → Developer settings → GitHub Apps → New GitHub App.
#      Required repository permissions:
#        Contents:       Read and write   (push branches and commits)
#        Pull requests:  Read and write   (open and update PRs)
#        Issues:         Read and write   (maintain the Dependency Dashboard issue)
#        Workflows:      Read and write   (so Renovate can update files in .github/workflows/)
#        Metadata:       Read             (granted automatically)
#      No webhook or callback URL is needed — Renovate polls.
#   2. Generate a private key for the App (Settings → "Generate a private key")
#      and download the PEM file.
#   3. Install the App on this repository
#      (App page → Install App → choose org → select this repo).
#   4. In this repo: Settings → Secrets and variables → Actions → New repository secret.
#        RENOVATE_APP_ID         = the App's numeric App ID (App settings page)
#        RENOVATE_APP_PRIVATE_KEY = the entire contents of the downloaded PEM,
#                                   including the BEGIN/END lines
#
# -----------------------------------------------------------------------------
# Why we don't use the built-in GITHUB_TOKEN
# -----------------------------------------------------------------------------
# Every workflow has access to ${{ secrets.GITHUB_TOKEN }} for free, and with the
# right permissions block GITHUB_TOKEN can open PRs on its own repository. So why
# bother with a separate identity?
#
# GitHub Actions deliberately blocks workflow triggers caused by GITHUB_TOKEN.
# This is a recursion guard: without it, a workflow that opened a PR could trigger
# another workflow that opens another PR, in an infinite loop.
#
# That rule kills Renovate's value proposition. The whole point of Renovate is
# "open a PR for an upgrade AND have CI run on it automatically, so the green
# check confirms the upgrade is safe." If Renovate opened PRs using GITHUB_TOKEN,
# the existing ci.yml workflow would NOT trigger on those PRs — every Renovate PR
# would sit unverified until a human manually re-ran CI.
#
# A GitHub App installation token has a different actor, the recursion guard
# doesn't apply, and ci.yml triggers normally on every Renovate PR.
#
# -----------------------------------------------------------------------------
# Local preview
# -----------------------------------------------------------------------------
# Run `renovate` (the script in buildSrc/scripts/) to preview what this workflow
# would propose, without touching GitHub. That's useful for tuning renovate.json
# before the workflow runs for real.
#
# =============================================================================

name: Renovate

on:
  schedule:
    # Daily at 01:00 UTC. Adjust to match your timezone or release cadence.
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Mint a short-lived installation token from the GitHub App credentials.
      # This token is scoped to whichever repos the App is installed on and
      # expires after ~1 hour — the secrets in the repo are the App ID and
      # private key, not a long-lived token.
      - name: Generate GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RENOVATE_APP_ID }}
          private-key: ${{ secrets.RENOVATE_APP_PRIVATE_KEY }}

      # Pre-flight: confirm the installation token can reach this repo.
      # If the App isn't installed (or isn't installed on this repo), the
      # token mint above succeeds but every API call returns 404. A single
      # repo read here surfaces that within a second instead of after a
      # ~10-minute Renovate scan. Per-permission checks are intentionally
      # skipped — those are configured on the App itself, and Renovate's
      # own logs name the missing permission clearly when it hits one.
      - name: Validate GitHub App token can access the repo
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if ! gh api "repos/$REPO" --jq .full_name >/dev/null 2>&1; then
              echo "::error::App installation token cannot read $REPO. Make sure the GitHub App is installed on this repository — see the workflow header."
              exit 1
          fi
          echo "Read access to $REPO: OK"

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.12
        with:
          token: ${{ steps.app-token.outputs.token }}
          configurationFile: renovate.json
        env:
          # Tell Renovate which repository to operate on. Without this it logs
          # "No repositories found" and exits without doing anything.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
