# =============================================================================
# Renovate (self-hosted, runs on GitHub Actions)
# =============================================================================
#
# Why self-hosted instead of the Mend-hosted Renovate GitHub App:
# This is a template that gets forked into private projects. Mend-hosted Renovate
# would clone every private fork to Mend's SaaS infrastructure to scan it. Running
# Renovate ourselves on GitHub-hosted Actions runners keeps the code inside
# GitHub's boundary — clones happen on ephemeral GitHub runners and never leave.
#
# -----------------------------------------------------------------------------
# One-time setup per fork
# -----------------------------------------------------------------------------
# This workflow needs a RENOVATE_TOKEN repository secret to function. Until the
# secret exists, the workflow runs on schedule but cannot open PRs.
#
# To create the secret:
#   1. Generate a fine-grained Personal Access Token at
#      GitHub Settings → Developer settings → Personal access tokens → Fine-grained.
#      Scope the token to this repository with these permissions:
#        Contents:       Read and write   (push branches and commits)
#        Pull requests:  Read and write   (open and update PRs)
#        Issues:         Read and write   (maintain the Dependency Dashboard issue)
#        Metadata:       Read             (required for any access)
#   2. In this repo: Settings → Secrets and variables → Actions → New repository secret.
#        Name:  RENOVATE_TOKEN
#        Value: (paste the PAT)
#
# -----------------------------------------------------------------------------
# Why we don't use the built-in GITHUB_TOKEN
# -----------------------------------------------------------------------------
# Every workflow has access to ${{ secrets.GITHUB_TOKEN }} for free, and with the
# right permissions block GITHUB_TOKEN can open PRs on its own repository. So why
# bother with a separate token?
#
# GitHub Actions deliberately blocks workflow triggers caused by GITHUB_TOKEN.
# This is a recursion guard: without it, a workflow that opened a PR could trigger
# another workflow that opens another PR, in an infinite loop.
#
# That rule kills Renovate's value proposition. The whole point of Renovate is
# "open a PR for an upgrade AND have CI run on it automatically, so the green
# check confirms the upgrade is safe." If Renovate opened PRs using GITHUB_TOKEN,
# the existing ci.yml workflow would NOT trigger on those PRs — every Renovate PR
# would sit unverified until a human manually re-ran CI.
#
# Using a PAT (acts as your user) or a self-managed GitHub App installation token
# sidesteps this. The PR's author is a different actor, the recursion guard
# doesn't apply, and ci.yml triggers normally on every Renovate PR.
#
# -----------------------------------------------------------------------------
# Local preview
# -----------------------------------------------------------------------------
# Run `renovate` (the script in buildSrc/scripts/) to preview what this workflow
# would propose, without touching GitHub. That's useful for tuning .github/renovate.json
# before the workflow runs for real.
#
# =============================================================================

name: Renovate

on:
  schedule:
    # Daily at 01:00 UTC. Adjust to match your timezone or release cadence.
    - cron: '0 1 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pre-flight: fail fast if RENOVATE_TOKEN is missing or under-scoped.
      # Without this, the workflow runs Renovate for ~10 minutes and only
      # discovers a permission problem when the final push is rejected.
      - name: Validate RENOVATE_TOKEN permissions
        env:
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # 1. Token authenticates.
          if ! user=$(gh api user --jq .login 2>/dev/null); then
              echo "::error::RENOVATE_TOKEN is missing or invalid. See the workflow header for setup instructions."
              exit 1
          fi
          echo "Token identity: $user"

          # 2. Read access to this repository (Metadata:read, included by default
          #    on any token scoped to this repo).
          if ! gh api "repos/$REPO" --jq .full_name >/dev/null 2>&1; then
              echo "::error::Token cannot read $REPO. The token must be scoped to (or include) this repository."
              exit 1
          fi
          echo "Read access to $REPO: OK"

          # 3. Branch create+delete (proves Contents:read-and-write).
          #    This is the same operation Renovate does for every PR; if it fails
          #    here, Renovate will fail with the same error after a long scan.
          test_branch="renovate-permission-check-${GITHUB_RUN_ID}"
          sha=$(gh api "repos/$REPO/git/refs/heads/main" --jq .object.sha)

          if ! gh api "repos/$REPO/git/refs" \
                  -f "ref=refs/heads/$test_branch" \
                  -f "sha=$sha" >/dev/null 2>&1; then
              echo "::error::Token cannot create branches on $REPO."
              echo "::error::Required permission: Contents: Read and write."
              echo "::error::For org-owned repos, the token must also be scoped to the org (resource owner = org name when creating a fine-grained PAT)."
              exit 1
          fi

          gh api -X DELETE "repos/$REPO/git/refs/heads/$test_branch" >/dev/null 2>&1 || \
              echo "::warning::Created test branch '$test_branch' but failed to delete it. Remove manually."
          echo "Branch create+delete on $REPO: OK"

          # Permissions NOT pre-flight tested (would require leaving real PRs/issues/commits behind):
          #   Pull requests: write — Renovate will surface a clear error if missing
          #   Issues: write        — needed for the Dependency Dashboard issue
          #   Workflows: write     — needed to update .github/workflows/*.yml; Renovate logs
          #                          "Workflows update rejection - aborting branch" if missing
          echo "::notice::Pre-flight passed for Contents:write. PR/Issues/Workflows write permissions are not tested here — Renovate logs clearly if any is missing."

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.12
        with:
          token: ${{ secrets.RENOVATE_TOKEN }}
          configurationFile: .github/renovate.json
        env:
          # Tell Renovate which repository to operate on. Without this it logs
          # "No repositories found" and exits without doing anything.
          RENOVATE_REPOSITORIES: ${{ github.repository }}
