name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Set up Gradle
        # cache-provider: basic forces the MIT-licensed cache implementation
        # (backed by actions/cache). v6 ships an enhanced "gradle-actions-caching"
        # library by default that is proprietary and may become paid for
        # commercial use; "basic" keeps this workflow 100% OSS.
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Build backend jar
        run: ./gradlew :applications:backend:bootJar

      - name: Resolve release asset
        id: jar
        run: |
          jar_path="$(find applications/backend/build/libs -maxdepth 1 -type f -name '*.jar' | head -n 1)"

          if [[ -z "$jar_path" ]]; then
            echo "No jar found in applications/backend/build/libs" >&2
            exit 1
          fi

          echo "path=$jar_path" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$jar_path")" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "${{ steps.jar.outputs.path }}#${{ steps.jar.outputs.name }}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            --verify-tag
